<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FSRI Flow Decision Tool</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #e2e8f0;
    }

    .container {
      width: 100%;
      max-width: 960px;
      background: #1e293b;
      border-radius: 16px;
      border: 1px solid #334155;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      padding: 20px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .body-content {
      padding: 24px 28px;
    }

    .input-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .input-card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 18px;
    }

    .input-card-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #94a3b8;
      margin-bottom: 14px;
      font-weight: 600;
    }

    .input-row {
      display: flex;
      gap: 12px;
    }

    .input-group {
      flex: 1;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      color: #64748b;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 10px 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 16px;
      font-weight: 600;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
      transition: border-color 0.2s, box-shadow 0.2s;
      text-align: center;
    }

    .input-group input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .input-group input::-webkit-inner-spin-button { opacity: 1; }

    .btn-update {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
      margin-bottom: 20px;
    }

    .btn-update:hover { opacity: 0.9; }
    .btn-update:active { transform: scale(0.99); }

    .chart-wrapper {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .chart-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #94a3b8;
      margin-bottom: 12px;
      font-weight: 600;
    }

    canvas {
      width: 100%;
      display: block;
      border-radius: 8px;
    }

    .result-bar {
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.6;
      border: 1px solid #334155;
      background: #0f172a;
    }

    .result-bar .tph-value {
      font-size: 28px;
      font-weight: 700;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
    }

    .result-bar .detail-line {
      color: #94a3b8;
      font-size: 13px;
      margin-top: 4px;
    }

    .result-bar .decision {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .decision-auto { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .decision-manual1 { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
    .decision-manual2 { background: rgba(234,179,8,0.15); color: #facc15; border: 1px solid rgba(234,179,8,0.3); }
    .decision-overload { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

    .fsri-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      background: rgba(168,85,247,0.15);
      color: #c084fc;
      border: 1px solid rgba(168,85,247,0.3);
    }

    .legend {
      display: flex;
      gap: 20px;
      margin-top: 10px;
      padding: 0 4px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #64748b;
    }

    .legend-dot {
      width: 10px;
      height: 3px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">⚡</div>
      <h1>FSRI Flow Decision Tool</h1>
    </div>

    <div class="body-content">
      <div class="input-section">
        <div class="input-card">
          <div class="input-card-title">SNS1 Configuration</div>
          <div class="input-row">
            <div class="input-group">
              <label>Packers</label>
              <input type="number" id="sns1" value="11">
            </div>
            <div class="input-group">
              <label>Throughput</label>
              <input type="number" id="sns1_tp" value="320">
            </div>
          </div>
        </div>
        <div class="input-card">
          <div class="input-card-title">SPP Configuration</div>
          <div class="input-row">
            <div class="input-group">
              <label>Packers</label>
              <input type="number" id="spp" value="3">
            </div>
            <div class="input-group">
              <label>Throughput</label>
              <input type="number" id="spp_tp" value="450">
            </div>
          </div>
        </div>
      </div>

      <button class="btn-update" onclick="update()">Update</button>

      <div class="chart-wrapper">
        <div class="chart-label">TPH History</div>
        <canvas id="canvas" width="850" height="300"></canvas>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Auto (3,300)</div>
          <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>+1 Manual (5,100)</div>
          <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>+2 Manual (6,900)</div>
          <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div>Current</div>
        </div>
      </div>

      <div class="result-bar" id="result"></div>
    </div>
  </div>

  <script>
    let history = [];

    function calcTPH(sns1, spp, sns1_tp, spp_tp) {
      return (sns1 * sns1_tp) + (spp * spp_tp);
    }

    function drawLine(ctx, x1, y1, x2, y2) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    function update() {
      let sns1 = parseInt(document.getElementById("sns1").value);
      let spp = parseInt(document.getElementById("spp").value);
      let sns1_tp = parseInt(document.getElementById("sns1_tp").value);
      let spp_tp = parseInt(document.getElementById("spp_tp").value);
      let tph = calcTPH(sns1, spp, sns1_tp, spp_tp);
      let now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      history.push({ time: now, value: tph });

      let canvas = document.getElementById("canvas");
      let ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, 850, 300);

      let maxTPH = 7000;
      function y(val) { return 250 - (val / maxTPH * 200); }

      // Grid lines
      ctx.strokeStyle = "#1e293b";
      ctx.lineWidth = 1;
      for (let v = 0; v <= maxTPH; v += 1000) {
        drawLine(ctx, 40, y(v), 820, y(v));
      }

      // Y-axis labels
      ctx.fillStyle = "#475569";
      ctx.font = "11px 'Segoe UI', sans-serif";
      for (let v = 0; v <= maxTPH; v += 1000) {
        ctx.fillText(v.toLocaleString(), 2, y(v) + 4);
      }

      // axes
      ctx.strokeStyle = "#334155";
      ctx.lineWidth = 1;
      drawLine(ctx, 40, 250, 820, 250);
      drawLine(ctx, 40, 20, 40, 250);

      // capacity lines
      ctx.setLineDash([6, 4]);
      ctx.lineWidth = 1.5;

      ctx.strokeStyle = "#3b82f6";
      drawLine(ctx, 40, y(3300), 820, y(3300));

      ctx.strokeStyle = "#22c55e";
      drawLine(ctx, 40, y(5100), 820, y(5100));

      ctx.strokeStyle = "#ef4444";
      drawLine(ctx, 40, y(6900), 820, y(6900));

      ctx.setLineDash([]);

      // flow line
      ctx.strokeStyle = "#94a3b8";
      ctx.lineWidth = 2;
      for (let i = 1; i < history.length; i++) {
        let x1 = 40 + (i - 1) * (780 / history.length);
        let x2 = 40 + i * (780 / history.length);
        drawLine(ctx, x1, y(history[i - 1].value), x2, y(history[i].value));
      }

      // points
      ctx.fillStyle = "#94a3b8";
      for (let i = 0; i < history.length; i++) {
        let x = 40 + i * (780 / history.length);
        let val = history[i].value;
        ctx.beginPath();
        ctx.arc(x, y(val), 3, 0, 2 * Math.PI);
        ctx.fill();
      }

      // highlight current
      let last = history[history.length - 1];
      let x = 40 + (history.length - 1) * (780 / history.length);
      ctx.fillStyle = "#f97316";
      ctx.beginPath();
      ctx.arc(x, y(last.value), 6, 0, 2 * Math.PI);
      ctx.fill();
      // glow
      ctx.fillStyle = "rgba(249, 115, 22, 0.2)";
      ctx.beginPath();
      ctx.arc(x, y(last.value), 12, 0, 2 * Math.PI);
      ctx.fill();

      ctx.fillStyle = "#94a3b8";
      ctx.font = "11px 'Segoe UI', sans-serif";
      ctx.fillText(last.time, x - 15, 270);

      // ===== AVERAGE =====
      let recent = history.slice(-5);
      let avg = 0;
      for (let i = 0; i < recent.length; i++) {
        avg += recent[i].value;
      }
      avg = avg / recent.length;

      // ===== FSRI LOGIC =====
      let fsri_needed = 0;
      if (avg > 5100) {
        let gap = avg - 5100;
        if (gap < 700) {
          fsri_needed = 1;
        } else if (gap < 1400) {
          fsri_needed = 2;
        } else {
          fsri_needed = 3;
        }
      }

      // ===== DECISION =====
      let decisionText = "";
      let decisionClass = "";
      if (avg <= 3300) {
        decisionText = "AUTO";
        decisionClass = "decision-auto";
      } else if (avg <= 5100) {
        decisionText = "+1 Manual";
        decisionClass = "decision-manual1";
      } else if (avg <= 6900) {
        decisionText = "+2 Manual";
        decisionClass = "decision-manual2";
      } else {
        decisionText = "OVERLOAD";
        decisionClass = "decision-overload";
      }

      let html = '<div class="tph-value">' + tph.toLocaleString() + ' <span style="font-size:14px;color:#64748b;font-weight:400;">TPH</span></div>';
      html += '<div class="detail-line">SNS1: ' + (sns1 * sns1_tp).toLocaleString() + ' &nbsp;·&nbsp; SPP: ' + (spp * spp_tp).toLocaleString() + ' &nbsp;·&nbsp; Avg (5): ' + Math.round(avg).toLocaleString() + '</div>';
      html += '<div style="margin-top:10px"><span class="decision ' + decisionClass + '">' + decisionText + '</span>';
      if (fsri_needed > 0) {
        html += '<span class="fsri-badge">Switch ' + fsri_needed + ' FSRI</span>';
      }
      html += '</div>';

      document.getElementById("result").innerHTML = html;
    }

    update();
  </script>
</body>
</html>
