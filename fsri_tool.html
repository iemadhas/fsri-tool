<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FSRI Flow Decision</title>

<style>
body {
  font-family: Arial;
  background: #0b1220;
  color: white;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 900px;
}

input {
  width: 60px;
  margin: 5px;
}

button {
  padding: 6px 10px;
}

canvas {
  background: #0b1220;
  margin-top: 10px;
  border: 1px solid #333;
}

.result {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>FSRI Flow Decision</h2>

SNS1:
<input id="sns1" type="number" value="11">
TP:
<input id="sns1_tp" type="number" value="320">

SPP:
<input id="spp" type="number" value="3">
TP:
<input id="spp_tp" type="number" value="450">

<button onclick="update()">Update</button>

<canvas id="canvas" width="850" height="300"></canvas>

<div id="result" class="result"></div>

</div>

<script>

let history = [];

function calcTPH(sns1, spp, sns1_tp, spp_tp){
  return (sns1*sns1_tp) + (spp*spp_tp);
}

function drawLine(ctx,x1,y1,x2,y2){
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
}

function update(){

  let sns1 = +document.getElementById("sns1").value;
  let spp = +document.getElementById("spp").value;
  let sns1_tp = +document.getElementById("sns1_tp").value;
  let spp_tp = +document.getElementById("spp_tp").value;

  let tph = calcTPH(sns1,spp,sns1_tp,spp_tp);

  let time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  history.push({value:tph, time:time});

  let ctx = document.getElementById("canvas").getContext("2d");
  ctx.clearRect(0,0,850,300);

  let max = 8000;

  function y(v){ return 250 - (v/max*200); }

  // axes
  ctx.strokeStyle="#555";
  drawLine(ctx,40,250,820,250);
  drawLine(ctx,40,20,40,250);

  // thresholds
  ctx.strokeStyle="blue";   // FSRI Auto
  drawLine(ctx,40,y(3300),820,y(3300));

  ctx.strokeStyle="green";  // +1 Manual
  drawLine(ctx,40,y(4800),820,y(4800));

  ctx.strokeStyle="red";    // heavy
  drawLine(ctx,40,y(6500),820,y(6500));

  // flow line
  ctx.strokeStyle="white";

  for(let i=1;i<history.length;i++){
    let x1 = 40+(i-1)*(780/history.length);
    let x2 = 40+i*(780/history.length);

    drawLine(ctx,x1,y(history[i-1].value),x2,y(history[i].value));
  }

  // points + labels
  history.forEach((h,i)=>{
    let x = 40+i*(780/history.length);
    let yPos = y(h.value);

    ctx.fillStyle="white";

    // point
    ctx.beginPath();
    ctx.arc(x,yPos,3,0,2*Math.PI);
    ctx.fill();

    // TPH label
    ctx.fillStyle="orange";
    ctx.font="10px Arial";
    ctx.fillText(Math.round(h.value), x-15, yPos-10);
  });

  // current point
  let last = history[history.length-1];
  let x = 40+(history.length-1)*(780/history.length);

  ctx.fillStyle="yellow";
  ctx.beginPath();
  ctx.arc(x,y(last.value),6,0,2*Math.PI);
  ctx.fill();

  ctx.fillStyle="yellow";
  ctx.font="12px Arial";
  ctx.fillText(Math.round(last.value), x-20, y(last.value)-15);

  // ===== AVERAGE =====
  let recent = history.slice(-5);
  let avg = recent.reduce((a,b)=>a+b.value,0)/recent.length;

  // ===== LOGIC =====
  let manual = 1;
  let fsri = 0;

  if(avg > 4800){
    manual = 2;
  }

  if(avg > 6500){
    manual = 3;
    fsri = 1;
  }

  if(avg > 7200){
    fsri = 2;
  }

  // ===== RESULT =====
  document.getElementById("result").innerHTML = `
    <b>TPH:</b> ${tph} |
    <b>AVG:</b> ${Math.round(avg)} <br>
    SNS1: ${sns1*sns1_tp} | SPP: ${spp*spp_tp} <br><br>

    👉 Manual: ${manual} <br>
    👉 FSRI Switch: ${fsri}
  `;
}

update();

</script>

</body>
</html>
