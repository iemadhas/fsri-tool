<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FSRI Flow Decision Tool</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #e2e8f0;
    }

    .container {
      width: 100%;
      max-width: 960px;
      background: #1e293b;
      border-radius: 20px;
      border: 1px solid #334155;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 20px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #3b82f6, #6366f1, #8b5cf6);
      padding: 22px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }

    .header::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header .subtitle {
      font-size: 12px;
      opacity: 0.7;
      font-weight: 400;
      margin-top: 2px;
    }

    /* ── Body ── */
    .body-content { padding: 24px 28px; }

    /* ── Input Cards ── */
    .input-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .input-card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 20px;
      transition: border-color 0.2s;
    }

    .input-card:hover {
      border-color: #475569;
    }

    .input-card-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #64748b;
      margin-bottom: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-card-title .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .input-group label {
      display: block;
      font-size: 11px;
      color: #64748b;
      margin-bottom: 6px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .input-group input {
      width: 100%;
      padding: 11px 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 17px;
      font-weight: 700;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      transition: border-color 0.2s, box-shadow 0.2s;
      text-align: center;
    }

    .input-group input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }

    /* ── Buttons ── */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.985); }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
    }

    .btn-secondary {
      background: #0f172a;
      color: #94a3b8;
      border: 1px solid #334155;
    }

    .btn-secondary:hover {
      color: #e2e8f0;
      border-color: #475569;
    }

    /* ── Chart ── */
    .chart-wrapper {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .chart-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #64748b;
      font-weight: 700;
    }

    .chart-count {
      font-size: 11px;
      color: #475569;
      background: #1e293b;
      padding: 3px 10px;
      border-radius: 20px;
    }

    canvas {
      width: 100%;
      display: block;
      border-radius: 8px;
    }

    .legend {
      display: flex;
      gap: 18px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #475569;
      font-weight: 500;
    }

    .legend-line {
      width: 14px;
      height: 2px;
      border-radius: 1px;
    }

    .legend-circle {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* ── Result ── */
    .result-panel {
      border-radius: 14px;
      padding: 22px;
      border: 1px solid #334155;
      background: #0f172a;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }

    .result-left {}

    .result-tph {
      font-size: 32px;
      font-weight: 800;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      letter-spacing: -1px;
      line-height: 1;
    }

    .result-tph .unit {
      font-size: 14px;
      color: #475569;
      font-weight: 500;
      letter-spacing: 0;
      margin-left: 4px;
    }

    .result-meta {
      margin-top: 8px;
      font-size: 13px;
      color: #64748b;
      display: flex;
      gap: 16px;
    }

    .result-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .result-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .badge-auto {
      background: rgba(34,197,94,0.1);
      color: #4ade80;
      border: 1px solid rgba(34,197,94,0.2);
    }

    .badge-manual1 {
      background: rgba(59,130,246,0.1);
      color: #60a5fa;
      border: 1px solid rgba(59,130,246,0.2);
    }

    .badge-manual2 {
      background: rgba(234,179,8,0.1);
      color: #facc15;
      border: 1px solid rgba(234,179,8,0.2);
    }

    .badge-overload {
      background: rgba(239,68,68,0.1);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);
      animation: pulse-glow 2s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
      50% { box-shadow: 0 0 12px 2px rgba(239,68,68,0.15); }
    }

    .badge-fsri {
      background: rgba(168,85,247,0.1);
      color: #c084fc;
      border: 1px solid rgba(168,85,247,0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">⚡</div>
      <div>
        <h1>FSRI Flow Decision Tool</h1>
        <div class="subtitle">Throughput monitoring &amp; manual allocation</div>
      </div>
    </div>

    <div class="body-content">
      <div class="input-section">
        <div class="input-card">
          <div class="input-card-title">
            <span class="dot" style="background:#3b82f6"></span> SNS1 Configuration
          </div>
          <div class="input-row">
            <div class="input-group">
              <label>Packers</label>
              <input id="sns1" type="number" value="11">
            </div>
            <div class="input-group">
              <label>Throughput</label>
              <input id="sns1_tp" type="number" value="320">
            </div>
          </div>
        </div>
        <div class="input-card">
          <div class="input-card-title">
            <span class="dot" style="background:#8b5cf6"></span> SPP Configuration
          </div>
          <div class="input-row">
            <div class="input-group">
              <label>Packers</label>
              <input id="spp" type="number" value="3">
            </div>
            <div class="input-group">
              <label>Throughput</label>
              <input id="spp_tp" type="number" value="450">
            </div>
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="update()">Update Current</button>
        <button class="btn btn-secondary" onclick="update(true)">+ Add Snapshot</button>
      </div>

      <div class="chart-wrapper">
        <div class="chart-header">
          <span class="chart-label">TPH History</span>
          <span class="chart-count" id="snap-count">0 snapshots</span>
        </div>
        <canvas id="canvas" width="850" height="300"></canvas>
        <div class="legend">
          <div class="legend-item"><div class="legend-line" style="background:#3b82f6"></div>4,800</div>
          <div class="legend-item"><div class="legend-line" style="background:#eab308"></div>6,500</div>
          <div class="legend-item"><div class="legend-line" style="background:#ef4444"></div>7,000</div>
          <div class="legend-item"><div class="legend-line" style="background:#dc2626"></div>7,500</div>
          <div class="legend-item"><div class="legend-line" style="background:#e2e8f0"></div>TPH</div>
          <div class="legend-item"><div class="legend-circle" style="background:#f97316"></div>Current</div>
        </div>
      </div>

      <div id="result" class="result-panel"></div>
    </div>
  </div>

  <script>
    let history = [];

    function calcTPH(sns1, spp, sns1_tp, spp_tp) {
      return sns1 * sns1_tp + spp * spp_tp;
    }

    function drawLine(ctx, x1, y1, x2, y2) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    function update(add = false) {
      let v_sns1 = +document.getElementById("sns1").value;
      let v_spp = +document.getElementById("spp").value;
      let v_sns1_tp = +document.getElementById("sns1_tp").value;
      let v_spp_tp = +document.getElementById("spp_tp").value;
      let tph = calcTPH(v_sns1, v_spp, v_sns1_tp, v_spp_tp);

      // FIX current vs history
      if (history.length === 0) {
        history.push({ value: tph });
      } else if (add) {
        history.push({ value: tph });
      } else {
        history[history.length - 1].value = tph;
      }

      document.getElementById("snap-count").textContent = history.length + " snapshot" + (history.length !== 1 ? "s" : "");

      drawChart();
      decision(tph);
    }

    function drawChart() {
      let canvas = document.getElementById("canvas");
      let ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, 850, 300);

      let max = 8500;
      let y = v => 250 - (v / max * 220);

      // grid
      ctx.strokeStyle = "#1e293b";
      ctx.lineWidth = 1;
      for (let i = 0; i <= max; i += 1000) {
        drawLine(ctx, 40, y(i), 820, y(i));
      }

      // y-axis labels
      ctx.fillStyle = "#334155";
      ctx.font = "10px 'Segoe UI', sans-serif";
      for (let i = 0; i <= max; i += 2000) {
        ctx.fillText(i.toLocaleString(), 4, y(i) + 3);
      }

      // axes
      ctx.strokeStyle = "#334155";
      drawLine(ctx, 40, 250, 820, 250);
      drawLine(ctx, 40, 20, 40, 250);

      // thresholds
      ctx.setLineDash([6, 4]);
      ctx.lineWidth = 1.5;

      ctx.strokeStyle = "#3b82f6";
      drawLine(ctx, 40, y(4800), 820, y(4800));

      ctx.strokeStyle = "#eab308";
      drawLine(ctx, 40, y(6500), 820, y(6500));

      ctx.strokeStyle = "#ef4444";
      drawLine(ctx, 40, y(7000), 820, y(7000));

      ctx.strokeStyle = "#dc2626";
      drawLine(ctx, 40, y(7500), 820, y(7500));

      ctx.setLineDash([]);

      // TPH flow line
      ctx.lineWidth = 2.5;
      if (history.length > 1) {
        ctx.strokeStyle = "#e2e8f0";
        ctx.shadowColor = "rgba(226,232,240,0.3)";
        ctx.shadowBlur = 6;
        for (let i = 1; i < history.length; i++) {
          let x1 = 40 + (i - 1) * (780 / (history.length - 1));
          let x2 = 40 + i * (780 / (history.length - 1));
          drawLine(ctx, x1, y(history[i - 1].value), x2, y(history[i].value));
        }
        ctx.shadowColor = "transparent";
        ctx.shadowBlur = 0;
      }

      // points
      history.forEach((p, i) => {
        let x = 40 + i * (780 / Math.max(1, history.length - 1));
        ctx.fillStyle = "#e2e8f0";
        ctx.beginPath();
        ctx.arc(x, y(p.value), 4, 0, 2 * Math.PI);
        ctx.fill();
      });

      // current
      let last = history[history.length - 1];
      let cx = 40 + (history.length - 1) * (780 / Math.max(1, history.length - 1));
      ctx.fillStyle = "rgba(249,115,22,0.2)";
      ctx.beginPath();
      ctx.arc(cx, y(last.value), 12, 0, 2 * Math.PI);
      ctx.fill();
      ctx.fillStyle = "#f97316";
      ctx.beginPath();
      ctx.arc(cx, y(last.value), 5, 0, 2 * Math.PI);
      ctx.fill();
    }

    function decision(tph) {
      let manual = 1;
      let fsri = 0;
      if (tph > 4800) manual = 2;
      if (tph > 6500) { manual = 3; fsri = 1; }
      if (tph > 7000) { manual = 4; fsri = 2; }
      if (tph > 7500) { manual = 5; fsri = 3; }

      let decisionText, badgeClass;
      if (manual === 1) {
        decisionText = "AUTO"; badgeClass = "badge-auto";
      } else if (manual === 2) {
        decisionText = "+1 Manual"; badgeClass = "badge-manual1";
      } else if (manual === 3) {
        decisionText = "+2 Manual"; badgeClass = "badge-manual2";
      } else if (manual === 4) {
        decisionText = "+3 Manual"; badgeClass = "badge-overload";
      } else if (manual === 5) {
        decisionText = "TOTAL MANUAL (5)"; badgeClass = "badge-overload";
      }

      let html = '<div class="result-left">';
      html += '<div class="result-tph">' + tph.toLocaleString() + '<span class="unit">TPH</span></div>';
      html += '<div class="result-meta">';
      html += '<span>Manual: ' + manual + '</span>';
      html += '</div></div>';
      html += '<div class="result-right">';
      html += '<span class="badge ' + badgeClass + '">' + decisionText + '</span>';
      if (fsri > 0) {
        html += '<span class="badge badge-fsri">Switch ' + fsri + ' FSRI</span>';
      }
      html += '</div>';

      document.getElementById("result").innerHTML = html;
    }

    update();
  </script>
</body>
</html>
