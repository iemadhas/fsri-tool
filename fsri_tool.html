<script>
let history = [];

function calcTPH(sns1, spp, sns1_tp, spp_tp) {
  return sns1 * sns1_tp + spp * spp_tp;
}

function drawLine(ctx, x1, y1, x2, y2) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

function update() {

  let sns1 = +document.getElementById("sns1").value;
  let spp = +document.getElementById("spp").value;
  let sns1_tp = +document.getElementById("sns1_tp").value;
  let spp_tp = +document.getElementById("spp_tp").value;

  let tph = calcTPH(sns1, spp, sns1_tp, spp_tp);

  // 🔥 FIX: update current instead of adding new point
  if (history.length === 0) {
    history.push({ value: tph });
  } else {
    history[history.length - 1].value = tph;
  }

  // ===== CHART =====
  let canvas = document.getElementById("canvas");
  let ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, 850, 300);

  let maxTPH = 8500;
  function y(val) { return 250 - (val / maxTPH * 220); }

  // grid
  ctx.strokeStyle = "#1e293b";
  for (let v = 0; v <= maxTPH; v += 1000) {
    drawLine(ctx, 40, y(v), 820, y(v));
  }

  // axis labels
  ctx.fillStyle = "#475569";
  ctx.font = "11px Segoe UI";
  for (let v = 0; v <= maxTPH; v += 1000) {
    ctx.fillText(v.toLocaleString(), 2, y(v) + 4);
  }

  // axes
  ctx.strokeStyle = "#334155";
  drawLine(ctx, 40, 250, 820, 250);
  drawLine(ctx, 40, 20, 40, 250);

  // thresholds
  ctx.setLineDash([6, 4]);

  ctx.strokeStyle = "#3b82f6";
  drawLine(ctx, 40, y(4800), 820, y(4800));

  ctx.strokeStyle = "#eab308";
  drawLine(ctx, 40, y(6500), 820, y(6500));

  ctx.strokeStyle = "#ef4444";
  drawLine(ctx, 40, y(7200), 820, y(7200));

  ctx.setLineDash([]);

  // flow line
  if (history.length > 1) {
    ctx.strokeStyle = "#94a3b8";
    ctx.lineWidth = 2;
    for (let i = 1; i < history.length; i++) {
      let x1 = 40 + (i - 1) * (780 / history.length);
      let x2 = 40 + i * (780 / history.length);
      drawLine(ctx, x1, y(history[i - 1].value), x2, y(history[i].value));
    }
  }

  // points
  ctx.fillStyle = "#94a3b8";
  for (let i = 0; i < history.length; i++) {
    let x = 40 + i * (780 / history.length);
    ctx.beginPath();
    ctx.arc(x, y(history[i].value), 3, 0, 2 * Math.PI);
    ctx.fill();
  }

  // current point
  let last = history[history.length - 1];
  let cx = 40 + (history.length - 1) * (780 / history.length);

  ctx.fillStyle = "rgba(249,115,22,0.2)";
  ctx.beginPath();
  ctx.arc(cx, y(last.value), 12, 0, 2 * Math.PI);
  ctx.fill();

  ctx.fillStyle = "#f97316";
  ctx.beginPath();
  ctx.arc(cx, y(last.value), 5, 0, 2 * Math.PI);
  ctx.fill();

  // ===== AVERAGE =====
  let recent = history.slice(-5);
  let avg = recent.reduce((a, b) => a + b.value, 0) / recent.length;

  // ===== LOGIC =====
  let manual = 1;
  let fsri = 0;

  if (avg > 4800) manual = 2;
  if (avg > 6500) { manual = 3; fsri = 1; }
  if (avg > 7200) fsri = 2;

  // ===== DECISION =====
  let decisionText = "";
  let decisionClass = "";

  if (manual === 1) {
    decisionText = "AUTO";
    decisionClass = "auto";
  } else if (manual === 2) {
    decisionText = "+1 Manual";
    decisionClass = "manual1";
  } else if (manual === 3 && fsri === 0) {
    decisionText = "+2 Manual";
    decisionClass = "manual2";
  } else {
    decisionText = "HIGH LOAD";
    decisionClass = "overload";
  }

  let colors = {
    auto: { bg: "rgba(34,197,94,0.12)", text: "#4ade80", border: "rgba(34,197,94,0.25)" },
    manual1: { bg: "rgba(59,130,246,0.12)", text: "#60a5fa", border: "rgba(59,130,246,0.25)" },
    manual2: { bg: "rgba(234,179,8,0.12)", text: "#facc15", border: "rgba(234,179,8,0.25)" },
    overload: { bg: "rgba(239,68,68,0.12)", text: "#f87171", border: "rgba(239,68,68,0.25)" }
  };

  let c = colors[decisionClass];

  let html = "";
  html += "<div style='font-size:28px;font-weight:700;'>" + tph.toLocaleString() + " TPH</div>";
  html += "<div style='color:#94a3b8;font-size:13px;'>Avg (last 5): " + Math.round(avg) + "</div>";
  html += "<div style='color:#64748b;font-size:12px;'>Manual: " + manual + "</div>";

  html += "<div style='margin-top:10px'>";
  html += "<span style='padding:6px 14px;border-radius:20px;background:" + c.bg + ";color:" + c.text + ";border:1px solid " + c.border + "'>" + decisionText + "</span>";

  if (fsri > 0) {
    html += "<span style='margin-left:8px;padding:6px 14px;border-radius:20px;background:rgba(168,85,247,0.12);color:#c084fc;border:1px solid rgba(168,85,247,0.25)'>Switch " + fsri + " FSRI</span>";
  }

  html += "</div>";

  document.getElementById("result").innerHTML = html;
}

update();
</script>
